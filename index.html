<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Configuración para PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a34a">
    <link rel="apple-touch-icon" href="icons/icono_192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Registro Fotográfico Squality</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería Cropper.js para edición de imagen -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f0fdf4;
            overscroll-behavior-y: contain;
        }

        .tire-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-large {
            height: 60px;
            border-radius: 30px;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .delete-btn-overlay, .edit-btn-overlay {
            position: absolute;
            top: 10px;
            z-index: 10;
            transition: transform 0.2s;
        }

        .delete-btn-overlay:active, .edit-btn-overlay:active {
            transform: scale(0.9);
        }

        .delete-btn-overlay { right: 10px; }
        .edit-btn-overlay { left: 10px; }

        .dropdown-content {
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }
        .dropdown-content.show {
            display: block;
        }

        #cropperModal {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 300;
            flex-direction: column;
        }
        #cropperModal.active {
            display: flex;
        }
        .cropper-container-box {
            flex: 1;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #cropperImage {
            max-width: 100%;
            display: block;
        }

        @keyframes pulse-green {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        .loading-pulse {
            animation: pulse-green 1.5s infinite;
        }

        .hidden { display: none !important; }

        #offlineBanner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #f59e0b;
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: 800;
            z-index: 1000;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body class="pb-40">

    <!-- Header -->
    <div id="offlineBanner" style="display:none; background:#f59e0b; color:white; text-align:center; padding:10px; position:fixed; top:0; width:100%; z-index:1000;">Sin conexión: Puedes preparar fotos, pero no enviarlas.</div>
    <div class="bg-white rounded-b-[40px] shadow-sm p-6 mb-8 border-b-2 border-green-100">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="bg-green-500 p-3 rounded-2xl shadow-lg rotate-3">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812-1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Squality</h1>
                        <p class="text-green-600 font-semibold text-sm">Registro de Inspección</p>
                    </div>
                </div>

                <div class="flex items-center gap-2">
                    <!-- BOTÓN DE INSTALACIÓN (Se mostrará solo cuando la PWA esté lista) -->
                    <button id="pwaInstallBtn" class="hidden bg-blue-600 text-white p-3 rounded-2xl shadow-lg active:scale-90 transition-all flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        <span class="text-[10px] font-black hidden sm:inline">INSTALAR APP</span>
                    </button>
                </div>
            </div>

            <!-- Sección de Carpetas -->
            <div class="grid grid-cols-1 gap-6">
                <!-- Crear Carpeta -->
                <div class="bg-slate-50/50 p-4 rounded-[30px] border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">1. Nueva Referencia</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="tireRef" placeholder="Ej: 4040, 3450" class="flex-1 bg-white border-2 border-slate-100 rounded-[22px] px-6 py-4 text-lg font-bold text-slate-700 outline-none focus:border-green-400 transition-all shadow-sm">
                        <button type="button" id="createFolderBtn" class="bg-green-600 hover:bg-green-700 text-white font-black px-8 py-4 rounded-[22px] shadow-lg shadow-green-200 active:scale-95 transition-all flex items-center justify-center gap-2">
                            CREAR CARPETA
                        </button>
                    </div>
                </div>

                <!-- Buscar Carpeta -->
                <div class="bg-slate-50/50 p-4 rounded-[30px] border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">2. Seleccionar Existente</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <div class="flex-1 relative">
                            <input type="text" id="folderSearchInput" placeholder="Escribe para filtrar..." class="w-full bg-white border-2 border-slate-100 rounded-[22px] px-6 py-4 text-lg font-bold text-slate-700 outline-none focus:border-green-400 transition-all shadow-sm">
                            <div id="folderDropdown" class="dropdown-content absolute left-0 right-0 top-full mt-2 bg-white border-2 border-slate-100 rounded-[24px] shadow-2xl z-[100] p-2 border-t-0">
                                <div id="folderList" class="flex flex-col gap-1"></div>
                            </div>
                        </div>
                        <button type="button" id="fetchFoldersBtn" class="bg-slate-800 hover:bg-slate-900 text-white font-bold px-8 py-4 rounded-[22px] active:scale-95 transition-all flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                        </button>
                    </div>

                    <button type="button" id="selectFolderBtn" class="mt-4 w-full bg-green-50 text-green-700 font-black py-4 rounded-[22px] border-2 border-green-200 uppercase text-xs tracking-widest hover:bg-green-100 transition-colors">
                        Confirmar Selección de Carpeta
                    </button>

                    <!-- Indicador de Carpeta Activa -->
                    <div id="activeFolderDisplay" class="hidden mt-4 p-2 bg-green-600 text-white rounded-[22px] flex items-center justify-between shadow-lg animate-in fade-in slide-in-from-top-2">
                        <div class="flex items-center gap-3 pl-4 py-1 overflow-hidden">
                            <span class="text-[9px] bg-white/20 px-2 py-0.5 rounded-full uppercase font-black tracking-tighter">Sesión Activa</span>
                            <span id="currentFolderName" class="font-black truncate uppercase tracking-tight"></span>
                        </div>
                        <button id="removeFolderBtn" class="w-10 h-10 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center ml-2 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Grid de Fotos -->
    <div class="max-w-5xl mx-auto px-4">
        <form id="tireForm">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="photoGrid">
                <!-- Generado dinámicamente mediante JS -->
            </div>

            <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#f0fdf4] via-[#f0fdf4] to-transparent z-50 pointer-events-none">
                <div class="max-w-md mx-auto pointer-events-auto">
                    <button type="submit" id="submitBtn" disabled class="btn-large w-full bg-slate-400 text-white font-black shadow-2xl transition-all flex items-center justify-center gap-3 active:scale-95 uppercase">
                        Enviar Inspección
                    </button>
                    <p id="lockMessage" class="text-center text-[10px] font-black text-red-500 mt-2 uppercase tracking-widest italic opacity-80">Selecciona una carpeta para habilitar</p>
                </div>
            </div>
        </form>
    </div>

    <!-- Modal Cropper -->
    <div id="cropperModal">
        <div class="p-4 flex items-center justify-between text-white bg-slate-900 border-b border-white/10">
            <h3 class="font-bold">Optimizar Fotografía</h3>
            <button id="closeCropper" class="p-2 bg-red-500/20 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div class="cropper-container-box">
            <img id="cropperImage" src="">
        </div>
        <div class="p-6 bg-slate-900 grid grid-cols-2 gap-4 border-t border-white/10">
            <button id="rotateCropper" class="py-4 bg-slate-800 text-white font-bold rounded-[20px] flex items-center justify-center gap-2 hover:bg-slate-700 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                GIRAR 90°
            </button>
            <button id="saveCropper" class="py-4 bg-green-500 text-white font-black rounded-[20px] flex items-center justify-center gap-2 shadow-xl shadow-green-500/20 hover:bg-green-400 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                CONFIRMAR
            </button>
        </div>
    </div>

    <!-- Modales Informativos -->
    <div id="selectionModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[200] flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-[40px] p-8 max-w-sm w-full shadow-2xl text-center border-4 border-green-500 scale-in-center">
            <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6 text-5xl">📁</div>
            <h2 class="text-2xl font-black text-slate-800 mb-2 italic tracking-tight">¡CARPETA LISTA!</h2>
            <p class="text-slate-500 font-medium mb-8">Has seleccionado: <span id="modalFolderName" class="text-green-600 font-black uppercase underline decoration-2"></span></p>
            <button id="closeModalBtn" class="w-full py-4 bg-slate-900 text-white rounded-[24px] font-black tracking-widest hover:bg-slate-800 active:scale-95 transition-all uppercase">CONTINUAR REGISTRO</button>
        </div>
    </div>

    <!-- Toast de Notificación -->
    <div id="statusToast" class="fixed top-8 left-1/2 -translate-x-1/2 w-[92%] max-w-sm bg-white rounded-[32px] shadow-[0_20px_50px_rgba(0,0,0,0.15)] p-6 transform -translate-y-40 opacity-0 transition-all duration-500 z-[400] border-2 border-green-500">
        <div class="flex flex-col items-center text-center gap-3">
            <div id="statusIcon" class="text-5xl"></div>
            <div>
                <p id="statusTitle" class="font-black text-slate-800 text-xl tracking-tight uppercase"></p>
                <p id="statusDesc" class="text-sm text-slate-500 font-semibold mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
        window.addEventListener('online', () => document.getElementById('offlineBanner').style.display = 'none');

        // --- 1. LÓGICA DE INSTALACIÓN PWA ---
        let deferredPrompt;
        const installBtn = document.getElementById('pwaInstallBtn');

        const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        if (isIOS && !isStandalone) {
            installBtn.classList.remove('hidden');
        }

        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log("SW registrado con éxito", reg))
                    .catch(err => console.log("Fallo al registrar SW", err));
            });
        }

        // Captura del evento de instalación
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Mostrar el botón de instalación
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) {
                // Si es iOS, no hay deferredPrompt, mostramos manual
                alert("Para instalar en iPhone:\n1. Toca el botón 'Compartir'.\n2. Baja y pulsa 'Agregar a inicio'.");
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden');
            }
            deferredPrompt = null;
        });

        // Ocultar botón si ya está instalada
        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
            console.log('App instalada con éxito');
        });

        // --- 2. DETECCIÓN DE INTERNET ---
        function updateOnlineStatus() {
            const banner = document.getElementById('offlineBanner');
            if (navigator.onLine) {
                banner.style.display = 'none';
            } else {
                banner.style.display = 'block';
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // --- 3. LÓGICA DE NEGOCIO (SQUALITY) ---
        const fields = [
            "Medida/IC/IV", "Serie1/DOT1", "Serie2/DOT2", "Serie3/DOT3", "Sticker",
            "Capacidad de carga/presion", "fabricante", "Hecho en", "TUBULESS",
            "Unidireccional", "Banda protectora", "banda rodamiento", "Otros",
            "Modelo", "LR/PR", "Tipo de carga Auto"
        ];

        const ENDPOINT = "https://registro-fotografico-squality-12773091505.northamerica-south1.run.app";
        let selectedFolderId = null, selectedFolderName = "", cropper = null, currentEditingIndex = null;

        const photoGrid = document.getElementById('photoGrid');
        const cropperModal = document.getElementById('cropperModal');
        const cropperImage = document.getElementById('cropperImage');
        const submitBtn = document.getElementById('submitBtn');

        // Inicializar Interfaz
        function init() {
            photoGrid.innerHTML = "";
            fields.forEach((field, index) => {
                const card = document.createElement('div');
                card.className = "tire-card bg-white rounded-[32px] shadow-sm p-6 relative flex flex-col gap-4 border-2 border-transparent transition-all";
                card.id = `card-${index}`;
                card.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[9px] font-black text-green-500 uppercase tracking-widest mb-1">Imagen ${index + 1}</span>
                        <h3 class="font-black text-slate-800 text-sm leading-tight uppercase tracking-tight">${field}</h3>
                    </div>
                    <div class="relative group">
                        <button type="button" class="delete-btn-overlay hidden w-10 h-10 bg-red-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-75" data-index="${index}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                        <button type="button" class="edit-btn-overlay hidden w-10 h-10 bg-blue-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-75" data-index="${index}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                        </button>
                        <input type="file" id="file-${index}" accept="image/*" capture="camera" class="hidden file-input" data-index="${index}">
                        <label for="file-${index}" class="file-label block w-full h-48 bg-slate-50 border-4 border-dashed border-slate-100 rounded-[24px] cursor-pointer hover:bg-green-50 hover:border-green-100 flex items-center justify-center overflow-hidden transition-all">
                            <div class="text-center p-6 preview-placeholder flex flex-col items-center">
                                <div class="bg-white w-12 h-12 rounded-xl flex items-center justify-center shadow-md mb-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812-1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /></svg>
                                </div>
                                <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">Tomar Foto</span>
                            </div>
                            <img src="" class="hidden w-full h-full object-cover img-preview">
                        </label>
                    </div>
                `;
                photoGrid.appendChild(card);
            });
        }

        // Lógica de Carpetas
        document.getElementById('createFolderBtn').onclick = async () => {
            const btn = document.getElementById('createFolderBtn'), name = document.getElementById('tireRef').value.trim();
            if (!name) return showToast("Error", "Ingresa una referencia", "error");
            btn.disabled = true; btn.innerHTML = "CARGANDO...";
            try {
                const res = await fetch(`${ENDPOINT}/api/v1/create-folder`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder_name: name })
                });
                const data = await res.json();
                if (data.status === "success") {
                    selectedFolderId = data.folder_id; selectedFolderName = name; updateSelectionUI();
                }
            } catch (e) { showToast("Fallo", "Error al crear la carpeta", "error"); }
            btn.disabled = false; btn.innerHTML = "CREAR CARPETA";
        };

        document.getElementById('fetchFoldersBtn').onclick = async () => {
            const btn = document.getElementById('fetchFoldersBtn');
            try {
                const res = await fetch(`${ENDPOINT}/api/v1/list-folders`);
                const data = await res.json();
                if (data.status === "success") {
                    const list = document.getElementById('folderList');
                    list.innerHTML = "";
                    data.folders.forEach(f => {
                        const b = document.createElement('button');
                        b.className = "text-left w-full p-4 hover:bg-green-50 rounded-xl font-bold flex gap-3 truncate transition-colors border-b last:border-0";
                        b.innerHTML = `<span>📂</span> <span class="truncate uppercase text-xs">${f.name}</span>`;
                        b.onclick = () => { document.getElementById('folderSearchInput').value = f.name; selectedFolderId = f.id; selectedFolderName = f.name; document.getElementById('folderDropdown').classList.remove('show'); };
                        list.appendChild(b);
                    });
                    document.getElementById('folderDropdown').classList.add('show');
                }
            } catch (e) {
                showToast("Error", "No se pudo cargar la lista", "error");
            } finally {
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>`;
            }
        };

        function renderFolderList(folders) {
            const list = document.getElementById('folderList');
            list.innerHTML = folders.length ? '' : '<p class="p-4 text-center text-slate-400 font-bold italic">Sin resultados</p>';
            folders.forEach(f => {
                const btn = document.createElement('button');
                btn.className = "text-left w-full p-4 hover:bg-green-50 rounded-xl font-bold flex gap-3 truncate transition-colors border-b last:border-0";
                btn.innerHTML = `<span>📂</span> <span class="truncate uppercase text-xs">${f.name}</span>`;
                btn.onclick = () => {
                    document.getElementById('folderSearchInput').value = f.name;
                    selectedFolderId = f.id;
                    selectedFolderName = f.name;
                    document.getElementById('folderDropdown').classList.remove('show');
                };
                list.appendChild(btn);
            });
        }

        function updateSelectionUI() {
            document.getElementById('modalFolderName').textContent = selectedFolderName;
            document.getElementById('selectionModal').classList.remove('hidden');
            document.getElementById('activeFolderDisplay').classList.remove('hidden');
            document.getElementById('currentFolderName').textContent = selectedFolderName;
            submitBtn.disabled = false; submitBtn.classList.replace('bg-slate-400', 'bg-green-600');
            document.getElementById('lockMessage').classList.add('hidden');
        }

        document.getElementById('selectFolderBtn').onclick = () => { if (selectedFolderId) updateSelectionUI(); else showToast("Aviso", "Elige una carpeta", "error"); };
        document.getElementById('removeFolderBtn').onclick = () => { selectedFolderId = null; document.getElementById('activeFolderDisplay').classList.add('hidden'); submitBtn.disabled = true; submitBtn.classList.replace('bg-green-600', 'bg-slate-400'); document.getElementById('lockMessage').classList.remove('hidden'); };

        // Lógica de Edición y Fotos
        photoGrid.onchange = (e) => {
            if (e.target.classList.contains('file-input')) {
                const file = e.target.files[0];
                if (file) {
                    currentEditingIndex = e.target.dataset.index;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        cropperImage.src = ev.target.result;
                        cropperModal.classList.add('active');
                        if (cropper) cropper.destroy();
                        cropper = new Cropper(cropperImage, { viewMode: 2, autoCropArea: 1 });
                    };
                    reader.readAsDataURL(file);
                }
            }
        };

        document.getElementById('saveCropper').onclick = () => {
            cropper.getCroppedCanvas({ maxWidth: 1600 }).toBlob((blob) => {
                const card = document.getElementById(`card-${currentEditingIndex}`);
                const preview = card.querySelector('.img-preview');
                preview.src = URL.createObjectURL(blob);
                preview.classList.remove('hidden');
                card.querySelector('.preview-placeholder').classList.add('hidden');
                card.querySelector('.delete-btn-overlay').classList.remove('hidden');
                card.querySelector('.edit-btn-overlay').classList.remove('hidden');
                card.classList.add('border-green-400', 'shadow-xl', 'scale-[1.02]');
                
                const file = new File([blob], `img_${currentEditingIndex}.jpg`, { type: "image/jpeg" });
                const dt = new DataTransfer(); dt.items.add(file);
                document.getElementById(`file-${currentEditingIndex}`).files = dt.files;
                cropperModal.classList.remove('active');
            }, 'image/jpeg', 0.85);
        };

        document.getElementById('rotateCropper').onclick = () => cropper.rotate(90);
        document.getElementById('closeCropper').onclick = () => cropperModal.classList.remove('active');
        document.getElementById('closeModalBtn').onclick = () => document.getElementById('selectionModal').classList.add('hidden');

        photoGrid.onclick = (e) => {
            const i = e.target.closest('button')?.dataset.index;
            if (!i) return;
            if (e.target.closest('.edit-btn-overlay')) {
                currentEditingIndex = i; cropperImage.src = document.getElementById(`card-${i}`).querySelector('.img-preview').src;
                cropperModal.classList.add('active'); if (cropper) cropper.destroy();
                cropper = new Cropper(cropperImage, { viewMode: 2, autoCropArea: 1 });
            } else if (e.target.closest('.delete-btn-overlay')) {
                const card = document.getElementById(`card-${i}`);
                document.getElementById(`file-${i}`).value = "";
                card.querySelector('.img-preview').classList.add('hidden');
                card.querySelector('.preview-placeholder').classList.remove('hidden');
                card.querySelector('.delete-btn-overlay').classList.add('hidden');
                card.querySelector('.edit-btn-overlay').classList.add('hidden');
                card.classList.remove('border-green-400', 'shadow-xl', 'scale-[1.02]');
            }
        };

        // Enviar Formulario
        document.getElementById('tireForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(); formData.append('folder_id', selectedFolderId);
            let photoCount = 0;
            fields.forEach((name, i) => {
                const input = document.getElementById(`file-${i}`);
                if (input.files[0]) {
                    const safeName = name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[ /]/g, "_");
                    formData.append(safeName, input.files[0]); photoCount++;
                }
            });
            if (!photoCount) return showToast("Error", "Carga al menos una foto", "error");
            submitBtn.disabled = true; submitBtn.innerHTML = "SUBIENDO...";
            try {
                const res = await fetch(`${ENDPOINT}/api/v1/upload`, { method: 'POST', body: formData });
                if (res.ok) { showToast("¡EXITO!", "Registro guardado", "success"); setTimeout(() => location.reload(), 2000); }
                else throw new Error();
            } catch (err) { showToast("FALLO", "Error al subir", "error"); submitBtn.disabled = false; submitBtn.innerHTML = "Enviar Inspección"; }
        };

        function showToast(title, desc, type) {
            const t = document.getElementById('statusToast');
            t.classList.replace('-translate-y-40', 'translate-y-0'); t.classList.replace('opacity-0', 'opacity-100');
            document.getElementById('statusTitle').textContent = title;
            document.getElementById('statusDesc').textContent = desc;
            document.getElementById('statusIcon').innerHTML = type === 'success' ? '🚀' : '⚠️';
            setTimeout(() => {
                t.classList.replace('translate-y-0', '-translate-y-40'); t.classList.replace('opacity-100', 'opacity-0');
            }, 3500);
        }

        // Búsqueda en tiempo real
        document.getElementById('folderSearchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = Array.from(document.querySelectorAll('#folderList button')).filter(btn => {
                const visible = btn.textContent.toLowerCase().includes(term);
                btn.style.display = visible ? 'flex' : 'none';
                return visible;
            });
            document.getElementById('folderDropdown').classList.toggle('show', term.length > 0);
        };

        init();
    </script>
</body>
</html>
